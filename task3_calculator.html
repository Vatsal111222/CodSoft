<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e3a8a);
      display: grid;
      place-items: center;
      padding: 30px;
      color: white;
    }
    .wrapper { width: min(420px, 100%); }
    .top-link {
      display: inline-block;
      color: #dbeafe;
      text-decoration: none;
      margin-bottom: 18px;
      font-weight: 700;
    }
    .calculator {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 28px;
      padding: 24px;
      box-shadow: 0 24px 70px rgba(0,0,0,0.35);
      backdrop-filter: blur(14px);
    }
    .display {
      width: 100%;
      min-height: 92px;
      background: #020617;
      color: #f8fafc;
      border: 0;
      border-radius: 18px;
      padding: 20px;
      font-size: 2.2rem;
      text-align: right;
      margin-bottom: 18px;
      overflow: hidden;
    }
    .keys {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }
    button {
      border: 0;
      border-radius: 16px;
      padding: 20px 10px;
      font-size: 1.2rem;
      font-weight: 800;
      cursor: pointer;
      background: #e2e8f0;
      color: #0f172a;
      transition: transform 0.15s, filter 0.15s;
    }
    button:hover { transform: translateY(-2px); filter: brightness(1.05); }
    .operator { background: #38bdf8; color: #082f49; }
    .action { background: #f97316; color: white; }
    .equals { background: #22c55e; color: white; grid-column: span 2; }
    .zero { grid-column: span 2; }
    .note { text-align: center; margin-top: 18px; color: #cbd5e1; line-height: 1.6; }
  </style>
</head>
<body>
  <main class="wrapper">
    <a class="top-link" href="index.html">← Back to Task Hub</a>
    <section class="calculator">
      <input class="display" id="display" value="0" readonly />
      <div class="keys">
        <button class="action" onclick="clearDisplay()">AC</button>
        <button class="action" onclick="deleteLast()">DEL</button>
        <button class="operator" onclick="appendValue('%')">%</button>
        <button class="operator" onclick="appendValue('/')">÷</button>

        <button onclick="appendValue('7')">7</button>
        <button onclick="appendValue('8')">8</button>
        <button onclick="appendValue('9')">9</button>
        <button class="operator" onclick="appendValue('*')">×</button>

        <button onclick="appendValue('4')">4</button>
        <button onclick="appendValue('5')">5</button>
        <button onclick="appendValue('6')">6</button>
        <button class="operator" onclick="appendValue('-')">−</button>

        <button onclick="appendValue('1')">1</button>
        <button onclick="appendValue('2')">2</button>
        <button onclick="appendValue('3')">3</button>
        <button class="operator" onclick="appendValue('+')">+</button>

        <button class="zero" onclick="appendValue('0')">0</button>
        <button onclick="appendValue('.')">.</button>
        <button class="equals" onclick="calculateResult()">=</button>
      </div>
    </section>
    <p class="note">Basic calculator using HTML, internal CSS, and JavaScript inside one file.</p>
  </main>

  <script>
    const display = document.getElementById('display');

    function appendValue(value) {
      if (display.value === '0' || display.value === 'Error') {
        display.value = value;
      } else {
        display.value += value;
      }
    }

    function clearDisplay() {
      display.value = '0';
    }

    function deleteLast() {
      if (display.value.length <= 1 || display.value === 'Error') {
        display.value = '0';
      } else {
        display.value = display.value.slice(0, -1);
      }
    }

    function calculateResult() {
      try {
        const expression = display.value;
        if (!/^[0-9+\-*/%.() ]+$/.test(expression)) {
          display.value = 'Error';
          return;
        }
        const result = Function('return ' + expression)();
        display.value = Number.isFinite(result) ? String(result) : 'Error';
      } catch (error) {
        display.value = 'Error';
      }
    }

    document.addEventListener('keydown', function(event) {
      const key = event.key;
      if ('0123456789+-*/%.'.includes(key)) appendValue(key);
      if (key === 'Enter') calculateResult();
      if (key === 'Backspace') deleteLast();
      if (key === 'Escape') clearDisplay();
    });
  </script>
</body>
</html>
